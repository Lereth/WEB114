<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Functions and Weekly Gas Totals</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <h1>Functions and Weekly Gas Totals</h1>

    
    <p>Question: What is the purpose of a function?</p>
    <p>
       A function is the main building blocks of a program. Often they are used to perform a single task. They allow code to be called/reused without repeating itself.
    </p>



    <script>

      
      let entryCount = 0;

      
      let totalGas = 0;

      
      let username = prompt("Enter your name:");

      
      if (username === null) {
        alert("You cancelled the name prompt.");
      } else if (username.trim() === "") {
       
        alert("You must type a name.");
      } else {
        <!-- Calling the function -->
        let average = calcGasAvg();

        
        if (average === null) {
          alert("You cancelled entering gas totals.");
        } else {
          let message = "";
          let entryMessage = "";

          
          if (entryCount === 0) {
            message = "No gas totals were entered.";
          } else if (entryCount === 1) {
            message =
              username.trim() + "'s gas total is $" + totalGas.toFixed(2) + ".";
          } else {
            message =
              username.trim() +
              "'s average weekly gas bill is $" +
              average.toFixed(2) +
              ".";
          }

          alert(message);

         
          if (entryCount === 0) {
            entryMessage = "No gas totals were entered.";
          } else if (entryCount === 1) {
            entryMessage = "You entered 1 gas total.";
          } else {
            entryMessage = "You entered " + entryCount + " gas totals.";
          }

          alert(entryMessage);
        }
      }

     
      function calcGasAvg() {
        
        let input;
        input = prompt(
          "Enter your first week's gas total. Enter -1 when you are done."
        );

        
        if (input === null) {
          return null;
        }

       
        let weeklyGas = parseFloat(input);

        
        while (weeklyGas !== -1) {
          
          if (isNaN(weeklyGas)) {
            alert("Please enter a valid number.");
            input = prompt(
              "Enter your gas total again. Enter -1 when you are done."
            );

            if (input === null) {
              return null;
            }

            weeklyGas = parseFloat(input);
            continue;
          }

          
          totalGas = totalGas + weeklyGas;
          entryCount++;

         
          input = prompt(
            "Enter your next week's gas total. Enter -1 when you are done."
          );

          if (input === null) {
            return null;
          }

          weeklyGas = parseFloat(input);
        }

       
        if (entryCount > 0) {
          return totalGas / entryCount;
        } else {
          return 0;
        }
      }
    </script>
  </body>
</html>
